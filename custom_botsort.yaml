# BoT-SORT Tracker Configuration (GMC DISABLED for Max Performance)
tracker_type: botsort
track_high_thresh: 0.5 
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 90
match_thresh: 0.8
# GMC (Global Motion Compensation) KAPALI:
# Önceden 'sparseOptFlow' idi, bu çok ciddi CPU darboğazı yapar. 
# Sabit kameralar için kapatılması performansı 2x-3x artırır.
gmc_method: none
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: False
fuse_score: True
model: auto
