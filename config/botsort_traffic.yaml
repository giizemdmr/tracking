# BoT-SORT Tracker Configuration for Traffic Analysis
# Based on ultralytics 8.4.35 default botsort.yaml with tuned values

tracker_type: botsort  # tracker type: botsort or bytetrack
track_high_thresh: 0.35  # lowered to associate faster moving targets
track_low_thresh: 0.1  # threshold for the second association
new_track_thresh: 0.6  # threshold for init new track if no match
track_buffer: 120  # ID silinme suresi 120 frame'e cikarildi (Kapanmalari uzun sure tolere edebilmek icin)
match_thresh: 0.95  # CRITICAL: increased from 0.8 to 0.95 allowing association of boxes that moved further
fuse_score: True  # fuse detection confidence into matching cost

# BoT-SORT specific parameters
gmc_method: none  # camera motion compensation: sparseOptFlow|orb|sift|ecc|none (fixed camera = none)

# ReID (Gorsel Hafiza) ve Occlusion Handling Parametreleri
proximity_thresh: 0.1  # IoU (konumsal mesafe) agirligi inanilmaz dusuruldu (Cost matrix esnekligi artirildi)
appearance_thresh: 0.65  # Cosine Similarity (Re-ID) agirligi/esigi
with_reid: False # ONNX Sabit Boyut hatasi veriyor. Python (Kalman) Vector Guard aktif kullanilacak.
model: osnet_x0_25_msmt17.onnx

# --- Reporting & Analysis Settings ---
regions_file: "bolgeler.json"
excel_filename: "trafik_raporu_yogunburc.xlsx"
zone_entry_frames: 3
zone_change_frames: 5
min_route_zone_duration: 15

# --- Model & Visualization ---
input_size: 1024
confidence_threshold: 0.25
display_scale: 1.0
